<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily OTP Sender</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Daily OTP Sender</h1>

    <label for="friendSelect">Select Friend</label>
    <select id="friendSelect">
      <option value="">-- Select Name --</option>
    </select>

    <div class="otp-box">
      <span id="otp">------</span>
    </div>

    <button onclick="generateOTP()">Generate OTP</button>
    <button onclick="sendToSelectedFriend()">Send WhatsApp</button>

    <p class="note">
      WhatsApp will open with the OTP message. You need to press Send manually.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
